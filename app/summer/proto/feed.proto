syntax = 'proto3';

import "app/summer/storage/summer/entry.proto";

option java_package = "app.summer.proto.feed";
option java_multiple_files = true;

message Feed {
  Entry entry = 1;
}

message GetFeedRequest {
}

message GetFeedResponse {
  Feed feed = 1;
}

service FeedService {
  rpc GetFeed (GetFeedRequest) returns (GetFeedResponse) {}
}