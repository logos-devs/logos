syntax = 'proto3';

import "app/summer/storage/summer/entry.proto";
import "app/summer/storage/summer/source_rss.proto";

option java_package = "app.summer.proto.feed";
option java_multiple_files = true;

message Source {
  bytes id = 1;
  string icon = 2;
}

message Feed {
  repeated Entry entry = 1;
  repeated Source source = 2;
}

message GetFeedRequest {
}

message GetFeedResponse {
  Feed feed = 1;
}

service FeedService {
  rpc GetFeed (GetFeedRequest) returns (GetFeedResponse) {}
}